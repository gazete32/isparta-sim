<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isparta 3D Sanal Gezi — Gazete32</title>
<meta name="description" content="Isparta'nın tarihi ve doğal güzelliklerini 3D olarak keşfedin.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.114.0/Build/Cesium/Widgets/widgets.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111827; --bg2: #1f2937; --bg3: #374151;
    --border: #374151; --text: #f9fafb; --text3: #9ca3af;
    --primary: #3b82f6; --green: #22c55e;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 1rem 16px; }

  /* BAŞLIK */
  .band { display:flex; align-items:center; flex-wrap:wrap; gap:10px;
          background:var(--bg2); border:1px solid var(--border);
          border-radius:8px; padding:.8rem 1.2rem; margin-bottom:.8rem; }
  .band__title { font-size:18px; font-weight:700; }
  .band__sub   { font-size:12px; color:var(--text3); margin-top:2px; }
  .band__badge { margin-left:auto; background:#0f1f30; color:var(--green);
                 font-size:11px; font-weight:700; padding:4px 12px;
                 border-radius:20px; display:flex; align-items:center; gap:5px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--green);
         animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ANA LAYOUT */
  .main { display:grid; grid-template-columns:1fr 300px; gap:12px; }
  @media(max-width:800px){ .main { grid-template-columns:1fr; } }

  /* HARİTA */
  .map-col {}
  .toolbar { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
  .tbtn { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600;
          padding:5px 12px; border-radius:6px; border:1px solid var(--border);
          background:var(--bg2); color:var(--text); cursor:pointer; transition:background .15s; }
  .tbtn:hover { background:var(--bg3); }
  .tbtn--on { background:#1e3a5f; border-color:var(--primary); color:#fff; }
  .tsep { flex:1; }

  #map { width:100%; height:520px; border-radius:8px; border:1px solid var(--border);
         background:#0d1b2a; }
  @media(max-width:600px){ #map { height:360px; } }
  .sim-fullscreen #map { position:fixed; inset:0; z-index:9999; height:100vh !important; border-radius:0; border:none; }
  .fs-close { position:fixed; top:14px; right:14px; z-index:10000;
              background:rgba(0,0,0,.8); color:#fff; border:none; border-radius:6px;
              padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; display:none; }
  .sim-fullscreen .fs-close { display:block; }

  .hint { font-size:11px; color:var(--text3); margin:5px 0 0 2px; }

  /* AUTOPILOT BAR */
  .auto-bar { display:flex; align-items:center; gap:8px; margin-top:8px;
              background:var(--bg2); border:1px solid var(--border);
              border-radius:8px; padding:.5rem .8rem; font-size:12px; }
  .auto-bar__lbl  { color:var(--text3); white-space:nowrap; }
  .auto-bar__name { font-weight:700; color:var(--text); min-width:120px; }
  .auto-bar__prog { flex:1; height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; }
  .auto-bar__fill { height:100%; background:var(--primary); border-radius:2px; width:0%; transition:width .15s; }
  .auto-bar__btn  { background:none; border:1px solid var(--border); color:var(--text3);
                    border-radius:4px; padding:3px 10px; font-size:11px; cursor:pointer; white-space:nowrap; }
  .auto-bar__btn:hover { background:var(--bg3); color:var(--text); }

  /* YER LİSTESİ */
  .side-col { display:flex; flex-direction:column; gap:10px; }
  .side-title { font-size:13px; font-weight:700; color:var(--text3);
                text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }

  .yer-list { display:flex; flex-direction:column; gap:6px; max-height:520px; overflow-y:auto;
              scrollbar-width:thin; scrollbar-color:var(--bg3) transparent; }
  .yer-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px;
              padding:10px 12px; cursor:pointer; transition:border-color .15s, background .15s; }
  .yer-card:hover { background:var(--bg3); border-color:var(--primary); }
  .yer-card--aktif { background:#1e3a5f; border-color:var(--primary); }
  .yer-card__row   { display:flex; align-items:center; gap:8px; }
  .yer-card__icon  { font-size:18px; flex-shrink:0; }
  .yer-card__name  { font-size:13px; font-weight:700; }
  .yer-card__kat   { font-size:10px; color:var(--primary); text-transform:uppercase;
                     letter-spacing:.5px; margin-top:1px; }
  .yer-card__desc  { font-size:11px; color:var(--text3); margin-top:5px; line-height:1.5;
                     display:none; }
  .yer-card--aktif .yer-card__desc { display:block; }

  .cesium-viewer-toolbar, .cesium-viewer-animationContainer,
  .cesium-viewer-timelineContainer, .cesium-viewer-bottom,
  .cesium-widget-credits { display:none !important; }

  .sim-footer { text-align:center; padding:1.2rem 0 .8rem; font-size:12px; color:var(--text3); margin-top:12px; }
  .sim-footer a { color:var(--primary); text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">

  <div class="band">
    <div>
      <div class="band__title">🏙 Isparta 3D Sanal Gezi</div>
      <div class="band__sub">Tarihi ve doğal güzellikleri havadan keşfedin · Gazete32</div>
    </div>
    <div class="band__badge"><span class="dot"></span>CesiumJS · Canlı 3D</div>
  </div>

  <div class="main">
    <!-- SOL: HARİTA -->
    <div class="map-col">
      <div class="toolbar">
        <button class="tbtn tbtn--on" id="btn-havaalani" onclick="yerGit('havaalani',this)">✈ Havalimanı</button>
        <button class="tbtn" id="btn-davraz"    onclick="yerGit('davraz',this)">⛰ Davraz</button>
        <button class="tbtn" id="btn-egirdir"   onclick="yerGit('egirdir',this)">🌊 Eğirdir</button>
        <button class="tbtn" id="btn-merkez"    onclick="yerGit('merkez',this)">🏙 Merkez</button>
        <span class="tsep"></span>
        <button class="tbtn" onclick="simTamEkran()">⛶ Tam Ekran</button>
      </div>

      <div id="map"></div>
      <p class="hint">🖱️ Sürükle · Kaydır · Çift tıkla yakınlaş &nbsp;·&nbsp; Sağ listeden yer seç → otomatik gider</p>

      <div class="auto-bar">
        <span class="auto-bar__lbl">✈ Otopilot:</span>
        <span class="auto-bar__name" id="auto-name">Havalimanı</span>
        <div class="auto-bar__prog"><div class="auto-bar__fill" id="auto-fill"></div></div>
        <button class="auto-bar__btn" id="auto-btn" onclick="autoToggle()">⏸ Duraklat</button>
      </div>
    </div>

    <!-- SAĞ: YER LİSTESİ -->
    <div class="side-col">
      <div class="side-title">📍 Isparta'yı Keşfet</div>
      <div class="yer-list" id="yer-list"></div>
    </div>
  </div>

  <button class="fs-close" onclick="simTamEkran()">✕ Kapat</button>

  <div class="sim-footer">
    <a href="https://www.gazete32.com.tr" target="_top">gazete32.com.tr</a> · Isparta 3D Sanal Gezi
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/cesium@1.114.0/Build/Cesium/Cesium.js"></script>
<script>
(function() {
  if (typeof Cesium === 'undefined') {
    document.getElementById('map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#fff;flex-direction:column;gap:12px;">' +
      '<span style="font-size:36px;">⚠️</span><p style="font-size:13px;opacity:.7;">CesiumJS yüklenemedi. Sayfayı yenileyin.</p></div>';
    return;
  }

  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI3ZjM2NzgzYy0yMzljLTQ5YzItODUxZS1iOTRkNzI0ZThlYjciLCJpZCI6NDM4MjIyLCJzdWIiOiJhZnNpbnRvcGN1IiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6ImdhemV0ZTMyIiwiaWF0IjoxNzgwMTQwNzg4fQ.l6uXsLGxsglFFEEqOKPflvVUmBvGD-tqknxRMDzphsE';

  /* ══════════════════════════════════════
     YER VERİTABANI
  ══════════════════════════════════════ */
  var YERLER = [
    /* DOĞA */
    { id:'davraz',    kat:'Doğa',    icon:'⛰',  ad:'Davraz Dağı',         lon:30.7550, lat:37.7410, alt:5500, heading:30,  pitch:-28, desc:'2635 m yüksekliğiyle Isparta\'nın en yüksek zirvesi. Kış turizminin merkezi.' },
    { id:'egirdir',   kat:'Doğa',    icon:'🌊', ad:'Eğirdir Gölü',         lon:30.8570, lat:37.8740, alt:4000, heading:270, pitch:-30, desc:'Türkiye\'nin 4. büyük tatlı su gölü. 468 km² yüzey alanı.' },
    { id:'kovada',    kat:'Doğa',    icon:'🌲', ad:'Kovada Gölü Milli Parkı', lon:30.9200, lat:37.7100, alt:3500, heading:180, pitch:-32, desc:'Türkiye\'nin ilk milli parklarından. Saf doğası ile ünlü.' },
    { id:'yazili',    kat:'Doğa',    icon:'🏞', ad:'Yazılı Kanyon',         lon:30.3700, lat:37.9500, alt:2800, heading:90,  pitch:-25, desc:'Türkiye\'nin en uzun kanyonlarından biri. 14 km uzunluğunda.' },
    /* TARİHİ */
    { id:'kaymakam',  kat:'Tarih',   icon:'🕌', ad:'Kaymakamlar Camii',     lon:30.5540, lat:37.7642, alt:1600, heading:0,   pitch:-20, desc:'18. yüzyıldan kalma, Isparta\'nın simgesi olan tarihi cami.' },
    { id:'firdevs',   kat:'Tarih',   icon:'🏛', ad:'Firdevs Bey Camii',     lon:30.5520, lat:37.7650, alt:1500, heading:45,  pitch:-18, desc:'15. yüzyılda inşa edilmiş, ahşap işçiliğiyle öne çıkan tarihi yapı.' },
    { id:'egirdir_k', kat:'Tarih',   icon:'🏰', ad:'Eğirdir Kalesi',        lon:30.8560, lat:37.8760, alt:2200, heading:160, pitch:-22, desc:'Selçuklu dönemine ait, göl kenarında konumlanan tarihi kale.' },
    { id:'sagalassos',kat:'Tarih',   icon:'🏺', ad:'Sagalassos Antik Kenti', lon:30.5200, lat:37.6800, alt:3800, heading:20,  pitch:-30, desc:'MÖ 1200\'den kalma, Toros Dağları\'ndaki muhteşem antik kent.' },
    /* ŞEHİR */
    { id:'merkez',    kat:'Şehir',   icon:'🏙', ad:'Isparta Merkezi',       lon:30.5550, lat:37.7640, alt:3000, heading:0,   pitch:-35, desc:'Isparta şehir merkezinin kuş bakışı görünümü.' },
    { id:'havaalani', kat:'Şehir',   icon:'✈',  ad:'Isparta Havalimanı',    lon:30.5682, lat:37.8553, alt:2500, heading:180, pitch:-25, desc:'Isparta Süleyman Demirel Havalimanı ve çevresi.' },
    { id:'gul',       kat:'Şehir',   icon:'🌹', ad:'Gül Bahçeleri',         lon:30.4800, lat:37.8200, alt:2200, heading:90,  pitch:-28, desc:'Dünyanın gül yağı üretiminin %70\'ini karşılayan ünlü gül bahçeleri.' },
    /* GÖLLER */
    { id:'golcuk',    kat:'Göl',     icon:'🏔', ad:'Gölcük Tabiat Parkı',   lon:30.6100, lat:37.8000, alt:2800, heading:270, pitch:-30, desc:'Volkanik krater gölü. İsparta\'nın en popüler piknik alanı.' },
    { id:'beysehir',  kat:'Göl',     icon:'💧', ad:'Beyşehir Gölü (kıyı)',  lon:31.0500, lat:37.8000, alt:4500, heading:300, pitch:-32, desc:'Türkiye\'nin en büyük tatlı su gölü sınırları içinde.' },
  ];

  /* Kategorilere göre sırala */
  var KATEGORI_SIRA = ['Doğa','Tarih','Şehir','Göl'];

  /* ══════════════════════════════════════
     CESIUM VIEWER
  ══════════════════════════════════════ */
  var viewer = new Cesium.Viewer('map', {
    baseLayerPicker:false, geocoder:false, homeButton:false,
    sceneModePicker:false, navigationHelpButton:false,
    animation:false, timeline:false, fullscreenButton:false,
    infoBox:false, selectionIndicator:false,
    shadows:false, shouldAnimate:true,
  });

  Cesium.CesiumTerrainProvider.fromIonAssetId(1)
    .then(function(tp) { viewer.terrainProvider = tp; })
    .catch(function(e) { console.warn('Terrain:', e); });

  viewer.scene.skyAtmosphere.show = true;
  viewer.scene.globe.enableLighting = false;
  viewer.scene.fog.enabled = true;
  viewer.scene.fog.density = 0.0002;
  viewer.scene.globe.maximumScreenSpaceError = 4;
  viewer.resolutionScale = 0.85;

  /* ── Yerler haritaya pin olarak ekle ── */
  YERLER.forEach(function(y) {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(y.lon, y.lat, 0),
      billboard: {
        image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40">' +
          '<circle cx="16" cy="16" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2.5"/>' +
          '<text x="16" y="21" text-anchor="middle" font-size="14">' + y.icon + '</text>' +
          '<line x1="16" y1="30" x2="16" y2="40" stroke="#3b82f6" stroke-width="2"/>' +
          '</svg>'
        ),
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        scale: 1.0,
      },
      label: {
        text: y.ad,
        font: 'bold 12px sans-serif',
        fillColor: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.BLACK,
        outlineWidth: 3,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        pixelOffset: new Cesium.Cartesian2(0, -44),
        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 80000),
      },
      properties: { yerId: y.id },
    });
  });

  /* Pin tıklama */
  var handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(function(click) {
    var picked = viewer.scene.pick(click.position);
    if (Cesium.defined(picked) && Cesium.defined(picked.id) && picked.id.properties) {
      var yerId = picked.id.properties.yerId.getValue();
      var y = YERLER.find(function(x){ return x.id === yerId; });
      if (y) kameraUc(y, false);
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

  /* ══════════════════════════════════════
     KAMERA
  ══════════════════════════════════════ */
  function kameraUc(y, anlik) {
    var dest = Cesium.Cartesian3.fromDegrees(y.lon, y.lat, y.alt);
    var ori  = { heading: Cesium.Math.toRadians(y.heading), pitch: Cesium.Math.toRadians(y.pitch), roll: 0 };
    if (anlik) {
      viewer.camera.setView({ destination: dest, orientation: ori });
    } else {
      viewer.camera.flyTo({ destination: dest, orientation: ori, duration: 3,
        easingFunction: Cesium.EasingFunction.SINUSOIDAL_IN_OUT });
    }
    /* Sidebar aktif et */
    aktifYerAyarla(y.id);
    /* Toolbar buton */
    ['havaalani','davraz','egirdir','merkez'].forEach(function(k) {
      var b = document.getElementById('btn-'+k);
      if (b) b.classList.toggle('tbtn--on', k === y.id);
    });
  }

  /* İlk görünüm */
  kameraUc(YERLER.find(function(y){ return y.id==='havaalani'; }), true);

  /* ══════════════════════════════════════
     SIDEBAR LİSTE OLUŞTUR
  ══════════════════════════════════════ */
  var listEl = document.getElementById('yer-list');
  KATEGORI_SIRA.forEach(function(kat) {
    var baslik = document.createElement('div');
    baslik.style.cssText = 'font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:4px 2px 2px;';
    baslik.textContent = kat;
    listEl.appendChild(baslik);

    YERLER.filter(function(y){ return y.kat===kat; }).forEach(function(y) {
      var card = document.createElement('div');
      card.className = 'yer-card';
      card.id = 'yer-'+y.id;
      card.innerHTML =
        '<div class="yer-card__row">' +
        '<span class="yer-card__icon">' + y.icon + '</span>' +
        '<div><div class="yer-card__name">' + y.ad + '</div>' +
        '<div class="yer-card__kat">' + y.kat + '</div></div></div>' +
        '<div class="yer-card__desc">' + y.desc + '</div>';
      card.addEventListener('click', function() {
        autoTogglePause();
        kameraUc(y, false);
      });
      listEl.appendChild(card);
    });
  });

  function aktifYerAyarla(id) {
    document.querySelectorAll('.yer-card').forEach(function(c){ c.classList.remove('yer-card--aktif'); });
    var el = document.getElementById('yer-'+id);
    if (el) {
      el.classList.add('yer-card--aktif');
      el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
    var y = YERLER.find(function(x){ return x.id===id; });
    document.getElementById('auto-name').textContent = y ? y.ad : '';
  }

  /* ══════════════════════════════════════
     OTOPİLOT
  ══════════════════════════════════════ */
  var autoAktif = true;
  var autoIdx   = 0;
  var autoZaman = 0;
  var AUTO_SURE = 8000; /* ms */

  /* Fare dokunuşunda 10 sn duraklat */
  var fareTimer;
  ['mousedown','touchstart','wheel'].forEach(function(ev) {
    viewer.scene.canvas.addEventListener(ev, function() {
      autoAktif = false;
      document.getElementById('auto-btn').textContent = '▶ Devam';
      clearTimeout(fareTimer);
      fareTimer = setTimeout(function() {
        autoAktif = true;
        document.getElementById('auto-btn').textContent = '⏸ Duraklat';
      }, 10000);
    }, { passive:true });
  });

  var sonZaman = performance.now();
  function autoDongu(simdi) {
    requestAnimationFrame(autoDongu);
    var dt = simdi - sonZaman;
    sonZaman = simdi;
    if (!autoAktif) return;
    autoZaman += dt;
    document.getElementById('auto-fill').style.width = Math.min(autoZaman/AUTO_SURE*100,100)+'%';
    if (autoZaman >= AUTO_SURE) {
      autoZaman = 0;
      autoIdx = (autoIdx + 1) % YERLER.length;
      kameraUc(YERLER[autoIdx], false);
    }
  }
  requestAnimationFrame(autoDongu);

  window.autoToggle = function() {
    autoAktif = !autoAktif;
    document.getElementById('auto-btn').textContent = autoAktif ? '⏸ Duraklat' : '▶ Devam';
  };
  function autoTogglePause() {
    autoAktif = false;
    autoZaman = 0;
    document.getElementById('auto-btn').textContent = '▶ Devam';
  }

  /* ══════════════════════════════════════
     TOOLBAR KISA YOLLAR
  ══════════════════════════════════════ */
  window.yerGit = function(id, btn) {
    autoTogglePause();
    var y = YERLER.find(function(x){ return x.id===id; });
    if (y) kameraUc(y, false);
  };

  /* ══════════════════════════════════════
     TAM EKRAN
  ══════════════════════════════════════ */
  var tamEkran = false;
  window.simTamEkran = function() {
    tamEkran = !tamEkran;
    document.body.classList.toggle('sim-fullscreen', tamEkran);
    document.body.style.overflow = tamEkran ? 'hidden' : '';
    setTimeout(function(){ viewer.resize(); }, 100);
  };
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && tamEkran) simTamEkran();
  });

})();
</script>
</body>
</html>
